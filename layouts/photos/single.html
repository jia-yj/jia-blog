{{- define "main" }}
<div class="photo-essay">
  <div class="photo-essay-header">
    <h1 class="photo-essay-title">{{ .Title }}</h1>
    {{- with .Params.date }}
    <span class="photo-essay-date">{{ . | time.Format "2006" }}</span>
    {{- end }}
    {{- with .Params.description }}
    <p class="photo-essay-desc">{{ . }}</p>
    {{- end }}
  </div>
  <div class="photo-essay-content">
    {{- .Content }}
  </div>
  <div class="photo-essay-nav">
    {{- with .PrevInSection }}
    <a href="{{ .Permalink }}">&larr; {{ .Title }}</a>
    {{- end }}
    {{- with .NextInSection }}
    <a href="{{ .Permalink }}" style="margin-left:auto">{{ .Title }} &rarr;</a>
    {{- end }}
  </div>
</div>
{{- end }}
