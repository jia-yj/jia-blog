{{ define "main" }}
<style>
  /* Reset PaperMod main container for portfolio */
  .main {
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  * { box-sizing: border-box; }

  .pf-layout {
    display: flex;
    min-height: calc(100vh - var(--header-height, 60px));
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
  }

  /* ── SIDEBAR ── */
  .pf-sidebar {
    width: 180px;
    flex-shrink: 0;
    position: sticky;
    top: var(--header-height, 60px);
    height: calc(100vh - var(--header-height, 60px));
    padding: 2rem 1.5rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .pf-nav {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .pf-nav-item {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: rgba(0,0,0,0.5);
    cursor: pointer;
    transition: color 0.15s;
    display: block;
    text-decoration: none;
  }

  .pf-nav-item:hover,
  .pf-nav-item.active { color: rgba(0,0,0,0.85); }

  .pf-series-list {
    display: none;
    flex-direction: column;
    gap: 0.3rem;
    margin-top: 0.35rem;
    padding-left: 0.9rem;
  }

  .pf-series-list.open { display: flex; }

  .pf-series-list a {
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: rgba(0,0,0,0.4);
    cursor: pointer;
    transition: color 0.15s;
    display: block;
    text-decoration: none;
  }

  .pf-series-list a:hover,
  .pf-series-list a.active { color: rgba(0,0,0,0.85); }

  /* ── CONTENT ── */
  .pf-content {
    flex: 1;
    min-width: 0;
    padding: 2rem 2rem 4rem 0.5rem;
  }

  /* ── GALLERY ── */
  .pf-gallery {
    column-count: 3;
    column-gap: 20px;
  }

  .pf-gallery img {
    width: 100%;
    display: block;
    margin-bottom: 20px;
    cursor: zoom-in;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .pf-gallery img.loaded { opacity: 1; }
  .pf-gallery img:hover { opacity: 0.88; }

  /* ── SERIES PAGE ── */
  .pf-series-header {
    margin-bottom: 2rem;
    padding-bottom: 1.2rem;
  }

  .pf-series-title {
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .pf-series-grid {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .pf-series-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .pf-series-grid img {
    width: 100%;
    display: block;
    cursor: zoom-in;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .pf-series-grid img.loaded { opacity: 1; }
  .pf-series-grid img:hover { opacity: 0.88; }

  /* ── LIGHTBOX ── */
  .pf-lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #fefeff;
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .pf-lightbox.active { display: flex; }

  .pf-lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.25s ease;
    cursor: zoom-out;
  }

  .pf-lightbox img.loaded { opacity: 1; }

  .pf-lb-close {
    position: fixed;
    top: 2rem;
    right: 2.5rem;
    font-size: 0.9rem;
    color: rgba(0,0,0,0.3);
    cursor: pointer;
    letter-spacing: 0.05em;
    z-index: 1001;
  }

  .pf-lb-close:hover { color: rgba(0,0,0,0.7); }

  .pf-lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    padding: 1.2rem;
    z-index: 1001;
    user-select: none;
    opacity: 0.3;
    transition: opacity 0.15s;
  }

  .pf-lb-nav:hover { opacity: 0.85; }
  .pf-lb-nav.prev { left: 0.8rem; }
  .pf-lb-nav.next { right: 0.8rem; }
  .pf-lb-nav.hidden { opacity: 0; pointer-events: none; }

  .pf-lb-nav svg { width: 20px; height: 20px; display: block; }

  .pf-lb-counter {
    position: fixed;
    bottom: 2.4rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.08em;
    z-index: 1001;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    .pf-sidebar { width: 140px; padding: 1.5rem 1rem 1.5rem 1.2rem; }
    .pf-gallery { column-count: 2; }
  }

  @media (max-width: 540px) {
    .pf-layout { flex-direction: column; }
    .pf-sidebar {
      width: 100%;
      height: auto;
      position: static;
      padding: 0.8rem 1.2rem;
      border-right: none;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .pf-nav {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.8rem 1.2rem;
    }
    .pf-series-list {
      position: absolute;
      background: #fefeff;
      padding: 0.5rem 0.8rem;
      border: 1px solid rgba(0,0,0,0.08);
      z-index: 50;
    }
    .pf-series-list:not(.open) { display: none; }
    .pf-gallery { column-count: 2; }
    .pf-content { padding: 1.2rem 1rem 3rem; }
    .pf-series-header { border-bottom: none; padding-bottom: 0; }
    .pf-lb-nav { top: auto; bottom: 1rem; transform: none; opacity: 0.45; }
    .pf-lb-nav svg { width: 26px; height: 26px; }
    .pf-lb-counter { bottom: 1rem; }
  }
</style>

<div class="pf-layout">
  <aside class="pf-sidebar">
    <nav class="pf-nav">
      <a class="pf-nav-item" href="#" onclick="pfRenderGallery();return false;" id="pf-nav-gallery">GALLERY</a>
      <div style="position:relative">
        <a class="pf-nav-item" id="pf-nav-series-toggle" onclick="pfToggleSeries(event)">SERIES</a>
        <div class="pf-series-list" id="pf-series-list">
          <a href="#" onclick="pfRenderSeries('光影');return false;" id="pf-snav-光影">光影</a>
          <a href="#" onclick="pfRenderSeries('树');return false;" id="pf-snav-树">树</a>
          <a href="#" onclick="pfRenderSeries('痕迹');return false;" id="pf-snav-痕迹">痕迹</a>
        </div>
      </div>
    </nav>
  </aside>
  <main class="pf-content" id="pf-content"></main>
</div>

<div class="pf-lightbox" id="pf-lightbox">
  <span class="pf-lb-close" onclick="pfCloseLightbox()">CLOSE</span>
  <span class="pf-lb-nav prev" id="pf-lb-prev" onclick="pfLbNav(-1)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13,4 7,10 13,16"/></svg>
  </span>
  <img id="pf-lightbox-img" src="" onclick="pfCloseLightbox()">
  <span class="pf-lb-nav next" id="pf-lb-next" onclick="pfLbNav(1)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7,4 13,10 7,16"/></svg>
  </span>
  <span class="pf-lb-counter" id="pf-lb-counter"></span>
</div>

<script>
  const IMG_BASE = 'https://portfolio-59x.pages.dev/';

  const GALLERY_PHOTOS = [
    "compressed/gallery/002024770005.jpg",
    "compressed/gallery/002024770010.jpg",
    "compressed/gallery/DSC01949.jpg",
    "compressed/gallery/DSC02439-3.jpg",
    "compressed/gallery/DSC03033-2.jpg",
    "compressed/gallery/DSC03131.JPG",
    "compressed/gallery/DSC03374-HDR-3.jpg",
    "compressed/gallery/DSC03514.jpg",
    "compressed/gallery/DSC03645.jpg",
    "compressed/gallery/DSC03762.jpg",
    "compressed/gallery/DSC03916.JPG",
    "compressed/gallery/DSC04048.JPG",
    "compressed/gallery/DSC04083.jpg",
    "compressed/gallery/DSC04104.JPG",
    "compressed/gallery/DSC04137.JPG",
    "compressed/gallery/DSC04333.JPG",
    "compressed/gallery/DSC04613.JPG",
    "compressed/gallery/DSC05208.JPG",
    "compressed/gallery/DSC05291.jpg",
    "compressed/gallery/DSC05302.jpg",
    "compressed/gallery/DSC05313.jpg",
    "compressed/gallery/DSC05414-2.jpg",
    "compressed/gallery/DSC05581.jpg",
    "compressed/gallery/DSC05675.JPG",
    "compressed/gallery/DSC05705.JPG",
    "compressed/gallery/DSC05716.JPG",
    "compressed/gallery/DSC07188-5.jpg",
    "compressed/gallery/DSC07789.jpg",
    "compressed/gallery/DSC08281-4.jpg",
    "compressed/gallery/DSC08293.jpg",
    "compressed/gallery/DSC09648.jpg",
    "compressed/gallery/IMG_1859.JPG",
    "compressed/gallery/IMG_6085.JPG",
    "compressed/gallery/DSC05643.JPG",
    "compressed/gallery/DSC01829.JPG",
    "compressed/gallery/DSC03474-4.jpg",
    "compressed/gallery/ofm 2025-10-24 133111.020.jpg",
    "compressed/gallery/ofm 2025-10-25 140019.112.jpg",
    "compressed/gallery/ofm 2025-10-25 140647.115.jpg",
  ].map(p => IMG_BASE + p);

  const SERIES = {
    "光影": {
      title: "光影",
      photos: [
        "compressed/光影/DSC05573.jpg",
        "compressed/光影/DSC05591.jpg",
        "compressed/光影/DSC03271.jpg",
        "compressed/光影/DSC03313.jpg",
        "compressed/光影/DSC03509.JPG",
        "compressed/光影/DSC08217.jpg",
        "compressed/光影/DSC03443.jpg",
        "compressed/光影/DSC03484.jpg",
      ].map(p => IMG_BASE + p)
    },
    "树": {
      title: "树",
      photos: [
        "compressed/树/DSC01733.JPG",
        "compressed/树/DSC03830.jpg",
        "compressed/树/DSC04182.JPG",
        "compressed/树/DSC04208.JPG",
        "compressed/树/DSC04215.JPG",
        "compressed/树/DSC04231.JPG",
        "compressed/树/DSC04257.JPG",
        "compressed/树/DSC04309.jpg",
        "compressed/树/DSC04582.JPG",
        "compressed/树/DSC04599.JPG",
        "compressed/树/DSC04636.JPG",
        "compressed/树/DSC04641.JPG",
        "compressed/树/DSC05310.jpg",
        "compressed/树/DSC05315.JPG",
        "compressed/树/DSC05347.jpg",
        "compressed/树/DSC05725.JPG",
        "compressed/树/DSC07704.jpg",
        "compressed/树/IMG_1855.JPG",
        "compressed/树/DSC07705-2.jpg",
        "compressed/树/b5554c997q22eceaaa0756595bc4a386.JPG",
      ].map(p => IMG_BASE + p)
    },
    "痕迹": {
      title: "痕迹",
      photos: [
        "compressed/痕迹/DSC00587.jpg",
        "compressed/痕迹/DSC00958.jpg",
        "compressed/痕迹/DSC01908.JPG",
        "compressed/痕迹/IMG_0144.jpg",
        "compressed/痕迹/IMG_1035.jpeg",
        "compressed/痕迹/classicu 2025-06-09 140139.690.jpg",
        "compressed/痕迹/classicu 2025-06-09 140139.835.jpg",
        "compressed/痕迹/dclassic 2025-06-09 155417.563.jpg",
        "compressed/痕迹/05F37939-6BA0-49D5-9435-29569C2FC38F.jpg",
      ].map(p => IMG_BASE + p)
    }
  };

  function pfMakeImg(src, list) {
    const img = document.createElement('img');
    img.src = src;
    img.onclick = () => pfOpenLightbox(src, list);
    return img;
  }

  function pfFadeIn(container) {
    container.querySelectorAll('img').forEach(img => {
      if (img.complete && img.naturalWidth) img.classList.add('loaded');
      else img.addEventListener('load', () => img.classList.add('loaded'));
    });
  }

  function pfRenderGallery() {
    pfSetNav('gallery');
    const el = document.getElementById('pf-content');
    const all = [...GALLERY_PHOTOS, ...Object.values(SERIES).flatMap(s => s.photos)];
    const div = document.createElement('div');
    div.className = 'pf-gallery';
    all.forEach(src => div.appendChild(pfMakeImg(src, all)));
    el.innerHTML = '';
    el.appendChild(div);
    pfFadeIn(el);
    window.scrollTo(0, 0);
  }

  function pfRenderSeries(name) {
    const data = SERIES[name];
    if (!data) { pfRenderGallery(); return; }
    pfSetNav('series', name);
    const el = document.getElementById('pf-content');
    const grid = document.createElement('div');
    grid.className = 'pf-series-grid';
    const col1 = document.createElement('div'); col1.className = 'pf-series-col';
    const col2 = document.createElement('div'); col2.className = 'pf-series-col';
    data.photos.forEach((src, i) => (i % 2 === 0 ? col1 : col2).appendChild(pfMakeImg(src, data.photos)));
    grid.appendChild(col1); grid.appendChild(col2);
    el.innerHTML = '';
    el.appendChild(grid);
    pfFadeIn(el);
    window.scrollTo(0, 0);
  }

  function pfSetNav(page, seriesName) {
    document.querySelectorAll('.pf-nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.pf-series-list a').forEach(el => el.classList.remove('active'));
    if (page === 'gallery') {
      document.getElementById('pf-nav-gallery').classList.add('active');
    } else if (page === 'series') {
      document.getElementById('pf-nav-series-toggle').classList.add('active');
      document.getElementById('pf-series-list').classList.add('open');
      const s = document.getElementById('pf-snav-' + seriesName);
      if (s) s.classList.add('active');
    }
  }

  function pfToggleSeries(e) {
    e.preventDefault();
    document.getElementById('pf-series-list').classList.toggle('open');
  }

  let pfLbPhotos = [], pfLbIndex = 0;

  function pfOpenLightbox(src, list) {
    pfLbPhotos = list;
    pfLbIndex = list.indexOf(src);
    if (pfLbIndex === -1) pfLbIndex = 0;
    pfLbShow();
    document.getElementById('pf-lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function pfLbShow() {
    const img = document.getElementById('pf-lightbox-img');
    img.classList.remove('loaded');
    img.src = pfLbPhotos[pfLbIndex];
    if (img.complete && img.naturalWidth) img.classList.add('loaded');
    else img.onload = () => img.classList.add('loaded');
    document.getElementById('pf-lb-prev').classList.toggle('hidden', pfLbIndex === 0);
    document.getElementById('pf-lb-next').classList.toggle('hidden', pfLbIndex === pfLbPhotos.length - 1);
    document.getElementById('pf-lb-counter').textContent =
      pfLbPhotos.length > 1 ? (pfLbIndex + 1) + ' / ' + pfLbPhotos.length : '';
  }

  function pfLbNav(dir) {
    const n = pfLbIndex + dir;
    if (n < 0 || n >= pfLbPhotos.length) return;
    pfLbIndex = n; pfLbShow();
  }

  function pfCloseLightbox() {
    document.getElementById('pf-lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('pf-lightbox').classList.contains('active')) return;
    if (e.key === 'Escape') pfCloseLightbox();
    if (e.key === 'ArrowLeft') pfLbNav(-1);
    if (e.key === 'ArrowRight') pfLbNav(1);
  });

  let pfTouchX = 0;
  const pfLb = document.getElementById('pf-lightbox');
  pfLb.addEventListener('touchstart', e => { pfTouchX = e.touches[0].clientX; }, { passive: true });
  pfLb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - pfTouchX;
    if (Math.abs(dx) > 50) pfLbNav(dx < 0 ? 1 : -1);
  }, { passive: true });

  function pfRoute() {
    const hash = location.hash || '#gallery';
    if (hash === '#gallery' || hash === '') pfRenderGallery();
    else if (hash.startsWith('#series/')) pfRenderSeries(decodeURIComponent(hash.slice(8)));
    else pfRenderGallery();
  }

  window.addEventListener('hashchange', pfRoute);
  pfRoute();
</script>
{{ end }}
