{{- define "main" }}
<div class="photo-list">
  {{- range .Pages }}
  <a class="photo-item" href="{{ .Permalink }}">
    {{- with .Params.cover.image }}
    <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
    {{- end }}
    <div class="photo-item-title">{{ .Title }}</div>
  </a>
  {{- end }}
</div>
{{- end }}
